name: Daily Naver Review Report

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "기준일자 (YYYY-MM-DD, 비우면 전일)"
        required: false
        type: string
  schedule:
    # 매일 한국시간 09:10 (UTC 00:10)
    # 매일 오전 7시 KST (전날 22:00 UTC)
    - cron: "0 22 * * *"

permissions:
  contents: read

concurrency:
  group: daily-naver-review-report
  cancel-in-progress: false

jobs:
  send-review-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
      BRIGHTDATA_ZONE: ${{ secrets.BRIGHTDATA_ZONE }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate secrets
        shell: bash
        run: |
          test -n "$BRIGHTDATA_API_KEY" || (echo "BRIGHTDATA_API_KEY is missing" && exit 1)
          test -n "$BRIGHTDATA_ZONE" || (echo "BRIGHTDATA_ZONE is missing" && exit 1)
          test -n "$TELEGRAM_BOT_TOKEN" || (echo "TELEGRAM_BOT_TOKEN is missing" && exit 1)
          test -n "$TELEGRAM_CHAT_IDS" || (echo "TELEGRAM_CHAT_IDS is missing" && exit 1)

      - name: Collect reviews and send Telegram report
        shell: bash
        env:
          TARGET_DATE: ${{ inputs.target_date }}
        run: |
          if [ -n "$TARGET_DATE" ]; then
            python review_crawler_brightdata.py --date "$TARGET_DATE" --telegram
          else
            python review_crawler_brightdata.py --telegram
          fi
